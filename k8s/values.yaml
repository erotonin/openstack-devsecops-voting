replicaCount: 1
service:
  type: ClusterIP
ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote.local
    result: result.local
images:
  vote:
    repository: voting-app-vote
    tag: dev
  result:
    repository: voting-app-result
    tag: dev
  worker:
    repository: voting-app-worker
    tag: dev
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine
appSecretName: voting-app-runtime
serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}
localDependencies:
  enabled: false
resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

