apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-voting-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/erotonin/devsecops-voting.git'
    targetRevision: HEAD
    path: k8s
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
