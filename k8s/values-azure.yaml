kyverno:
  enabled: false
replicaCount: 1

service:
  type: ClusterIP
services:
  vote:
    # Only vote needs a public endpoint for DNS failover and user traffic.
    type: LoadBalancer
  result:
    # Keep result private on Azure student subscriptions to avoid public IP quota.
    type: ClusterIP

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-vote
    tag: 85f3e115189574d4aaaa6befd2c5cb0f73b2df55
    digest: sha256:cf0cb58f0e471ed0d18f2bb81ec57f7c01f9f5bace9ed397d686f425ddd4972e
  result:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-result
    tag: 85f3e115189574d4aaaa6befd2c5cb0f73b2df55
    digest: sha256:ed068ea72c9274916317b3ce40d6ae65556516996ba9ad7fa698a70f3e817e9e
  worker:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-worker
    tag: 85f3e115189574d4aaaa6befd2c5cb0f73b2df55
    digest: sha256:c0a3585ce8dc90f840b8e65205d1ec720158ca72fda091c175678d4ab3dcc882
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
  redis:
    enabled: true
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
