replicaCount: 1

service:
  type: ClusterIP

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacrk1nhkh.azurecr.io/voting-app-vote
    tag: f2e8604c9ac4a7e3c708ae1d16682cc4b9db2994
  result:
    repository: devsecopsvotingacrk1nhkh.azurecr.io/voting-app-result
    tag: f2e8604c9ac4a7e3c708ae1d16682cc4b9db2994
  worker:
    repository: devsecopsvotingacrk1nhkh.azurecr.io/voting-app-worker
    tag: f2e8604c9ac4a7e3c708ae1d16682cc4b9db2994
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
