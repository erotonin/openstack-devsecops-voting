kyverno:
  enabled: false
replicaCount: 1

service:
  type: ClusterIP
services:
  vote:
    # Only vote needs a public endpoint for DNS failover and user traffic.
    type: LoadBalancer
  result:
    # Keep result private on Azure student subscriptions to avoid public IP quota.
    type: ClusterIP

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacreyvpxg.azurecr.io/voting-app-vote
    tag: 10f66a8bf891b313f5d6cb3b7791dc9c154a83db
    digest: sha256:782f3d0dcb99b67e2c1fe2e603f33263400d90549a1330d9569db422120e7fc1
  result:
    repository: devsecopsvotingacreyvpxg.azurecr.io/voting-app-result
    tag: 10f66a8bf891b313f5d6cb3b7791dc9c154a83db
    digest: sha256:9e366eb13fcfc3940b3e2f4100c124bd32b68900c46344d94d14538473854aec
  worker:
    repository: devsecopsvotingacreyvpxg.azurecr.io/voting-app-worker
    tag: 10f66a8bf891b313f5d6cb3b7791dc9c154a83db
    digest: sha256:2d9986931ba0a0be18ebe2a9b244e4373410cc71bb12897905b1879a4640fd57
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
  redis:
    enabled: true
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
