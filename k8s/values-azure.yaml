kyverno:
  enabled: false
replicaCount: 1

service:
  type: ClusterIP
services:
  vote:
    # Only vote needs a public endpoint for DNS failover and user traffic.
    type: LoadBalancer
  result:
    # Keep result private on Azure student subscriptions to avoid public IP quota.
    type: ClusterIP

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-vote
    tag: 169a59f0dc4f5da4d79cbfa79d7b294ee186b982
    digest: sha256:2f629ed11d6083ef71383d27ea2816a917a18481a5383ea5841847532a269045
  result:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-result
    tag: 169a59f0dc4f5da4d79cbfa79d7b294ee186b982
    digest: sha256:bf5ae9a299209f67d6d07fe556cea22866ebed6672e479fd1b8a7d5328012024
  worker:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-worker
    tag: 169a59f0dc4f5da4d79cbfa79d7b294ee186b982
    digest: sha256:13b80e3c9d921cf039459d31be4d55913560fdb776515d6cce7da4a360c5f163
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
  redis:
    enabled: true
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
