kyverno:
  enabled: false
replicaCount: 1

service:
  # LoadBalancer exposes a public IP on AKS so DNS failover can point traffic here
  type: LoadBalancer

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacrfi1hac.azurecr.io/voting-app-vote
    tag: 1de5001657d2855eae84788d80ef9d4e8f0a6dc1
    digest: sha256:918fef96980c139a7cd8eb2b6da99fadcff98d98c8d0e84e6a0de3a5dd4497f5
  result:
    repository: devsecopsvotingacrfi1hac.azurecr.io/voting-app-result
    tag: 1de5001657d2855eae84788d80ef9d4e8f0a6dc1
    digest: sha256:e45dd6967f0f2480f800d45becae3da66702b667b6d61fde1c11ab5763e907ac
  worker:
    repository: devsecopsvotingacrfi1hac.azurecr.io/voting-app-worker
    tag: 1de5001657d2855eae84788d80ef9d4e8f0a6dc1
    digest: sha256:5de1139e93086dc972cff2747ea5ac45c359180014456eacd18645e1520ac90b
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
