kyverno:
  enabled: false
replicaCount: 1

service:
  type: ClusterIP
services:
  vote:
    # Only vote needs a public endpoint for DNS failover and user traffic.
    type: LoadBalancer
  result:
    # Keep result private on Azure student subscriptions to avoid public IP quota.
    type: ClusterIP

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacreyvpxg.azurecr.io/voting-app-vote
    tag: e164025b90fccd645e2aa2853d485d0023019103
    digest: sha256:5713af8d425b51ed0e1c044fa2b8db5f981581428c75fe4c0912fae904c71f0b
  result:
    repository: devsecopsvotingacreyvpxg.azurecr.io/voting-app-result
    tag: e164025b90fccd645e2aa2853d485d0023019103
    digest: sha256:acbb6f181ca97025edb9a1daacd3d6c18a8a5993fc2783e5df8319097487c253
  worker:
    repository: devsecopsvotingacreyvpxg.azurecr.io/voting-app-worker
    tag: e164025b90fccd645e2aa2853d485d0023019103
    digest: sha256:45206dcd2a8fb3500b641448fa200c1d2ccd5771d6dd252b9953506cc17a1851
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
  redis:
    enabled: true
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
