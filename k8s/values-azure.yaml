kyverno:
  enabled: false
replicaCount: 1

service:
  type: ClusterIP
services:
  vote:
    # Only vote needs a public endpoint for DNS failover and user traffic.
    type: LoadBalancer
  result:
    # Keep result private on Azure student subscriptions to avoid public IP quota.
    type: ClusterIP

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-vote
    tag: 70f91dd3533fc5b7e4545a44b5ec0ffad72240cb
    digest: sha256:c5218b7b6ac50ca2280a6065f8d0614161e4715093ebcc9312728c3aa70380ec
  result:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-result
    tag: 70f91dd3533fc5b7e4545a44b5ec0ffad72240cb
    digest: sha256:817ee5f87768e7ea93f96fb2bc7970f34bd90e8b4cc8b88b9d9210657b0c6a8c
  worker:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-worker
    tag: 70f91dd3533fc5b7e4545a44b5ec0ffad72240cb
    digest: sha256:49d79fbf86c93f8a1f26f2ee654b56b0237ca80a4c87953b471f5e5e4ce2bf09
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
  redis:
    enabled: true
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
