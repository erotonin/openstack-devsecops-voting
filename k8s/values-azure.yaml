kyverno:
  enabled: false
replicaCount: 1

service:
  type: ClusterIP
services:
  vote:
    # Only vote needs a public endpoint for DNS failover and user traffic.
    type: LoadBalancer
  result:
    # Keep result private on Azure student subscriptions to avoid public IP quota.
    type: ClusterIP

ingress:
  enabled: false
  className: ""
  hosts:
    vote: vote-azure.example.com
    result: result-azure.example.com

images:
  vote:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-vote
    tag: b6808d95a232dd5f7558c0dac219d9c8ad2657ed
    digest: sha256:9e5178ee12a6589521e0ab312ab1a39b052a01e889d8f3404a7bb5e0d7981111
  result:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-result
    tag: b6808d95a232dd5f7558c0dac219d9c8ad2657ed
    digest: sha256:633a19846e7503fd74ed52919b55eed1e45f33d1d8b4c807ecfd59f9d98864ff
  worker:
    repository: devsecopsvotingacrpgx92e.azurecr.io/voting-app-worker
    tag: b6808d95a232dd5f7558c0dac219d9c8ad2657ed
    digest: sha256:5eeb8c6ce16184688ae5672c8c4e67f9d352c7ae0301aa60c81ac9f8262fa979
  redis:
    repository: redis
    tag: 7-alpine
  db:
    repository: postgres
    tag: 15-alpine

appSecretName: voting-app-runtime

serviceAccounts:
  vote:
    name: vote-sa
    annotations: {}
  result:
    name: result-sa
    annotations: {}
  worker:
    name: worker-sa
    annotations: {}

localDependencies:
  enabled: false
  redis:
    enabled: true
externalSecret:
  enabled: true
  storeName: azure-key-vault
  remoteKey: voting-app-runtime

monitoring:
  enabled: false
  prometheusRelease: kube-prometheus-stack
  slo:
    successRateTarget: 0.99
    p95LatencySeconds: 0.5
    alertFor: 1m

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  vote:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  result:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  worker:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
