{{- if .Values.autoscaling.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vote-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vote
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: result-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: result
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker
{{- end }}
