{{- if .Values.kyverno.enabled }}
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Cosign Signatures
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Enforces that all images matching the voting-app pattern must be signed by the official
      GitHub Actions CI pipeline using keyless signatures (Sigstore).
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    - name: verify-voting-app-signatures
      match:
        any:
        - resources:
            kinds:
              - Pod
      verifyImages:
      - imageReferences:
        - "*.azurecr.io/voting-app-*"
        - "*.dkr.ecr.*.amazonaws.com/voting-app-*"
        - "ghcr.io/erotonin/voting-app-*"
        mutateDigest: true
        verifyDigest: true
        required: true
        attestors:
        - count: 1
          entries:
          - keyless:
              subject: "https://github.com/erotonin/devsecops-voting/.github/workflows/ci-pipeline.yml@refs/heads/main"
              issuer: "https://token.actions.githubusercontent.com"
              rekor:
                url: https://rekor.sigstore.dev
{{- end }}
