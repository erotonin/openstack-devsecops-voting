services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment: 
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - voting-network
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - voting-network
  vote:
    build: ./vote
    container_name: vote
    ports:
      - "5000:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      COOKIE_SECURE: "false"
    networks:
      - voting-network
    depends_on:
      - redis
  result:
    build: ./result
    container_name: result
    ports:
      - "5001:4000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: postgres
    networks:
      - voting-network
    depends_on:
      - db
  worker:
    build: ./worker
    container_name: worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: postgres
    networks:
      - voting-network
    depends_on:
      - redis
      - db
networks:
  voting-network:
    driver: bridge
volumes:
  db-data:
