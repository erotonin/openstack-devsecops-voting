services:
  db:
    image: postgres:15-alpine
    container_name: db
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - voting-network
  redis:
    image: redis:7-alpine
    container_name: redis
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - redis-data:/data
    security_opt:
      - no-new-privileges:true
    networks:
      - voting-network
  vote:
    build: ./vote
    container_name: vote
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    ports:
      - "5000:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      COOKIE_SECURE: "false"
    networks:
      - voting-network
    depends_on:
      - redis
  result:
    build: ./result
    container_name: result
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    ports:
      - "5001:4000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
    networks:
      - voting-network
    depends_on:
      - db
  worker:
    build: ./worker
    container_name: worker
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
    networks:
      - voting-network
    depends_on:
      - redis
      - db
networks:
  voting-network:
    driver: bridge
volumes:
  db-data:
  redis-data:
