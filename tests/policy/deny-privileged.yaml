apiVersion: v1
kind: Pod
metadata:
  name: policy-deny-privileged
  namespace: voting
spec:
  containers:
  - name: busybox
    image: busybox:1.36
    command:
    - sh
    - -c
    - sleep 3600
    securityContext:
      privileged: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi
