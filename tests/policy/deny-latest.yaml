apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-deny-latest
  namespace: voting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-deny-latest
  template:
    metadata:
      labels:
        app: policy-deny-latest
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: nginx:latest
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
