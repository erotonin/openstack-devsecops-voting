apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-deny-missing-resources
  namespace: voting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-deny-missing-resources
  template:
    metadata:
      labels:
        app: policy-deny-missing-resources
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: busybox
        image: busybox:1.36
        command:
        - sh
        - -c
        - sleep 3600
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
