apiVersion: v1
kind: Pod
metadata:
  name: policy-deny-missing-resources
  namespace: voting
spec:
  containers:
  - name: busybox
    image: busybox:1.36
    command:
    - sh
    - -c
    - sleep 3600
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
