repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^k8s/templates/
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: checkov-local
        name: checkov local scan
        entry: python scripts/precommit_checkov.py
        language: system
        pass_filenames: false
        always_run: true
      - id: terraform-fmt-local
        name: terraform fmt
        entry: python scripts/precommit_terraform.py fmt
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$
      - id: terraform-validate-local
        name: terraform validate
        entry: python scripts/precommit_terraform.py validate
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$
      - id: hadolint-local
        name: hadolint Dockerfiles
        entry: python scripts/precommit_hadolint.py
        language: system
        pass_filenames: true
        files: (^|/)Dockerfile$
      - id: semgrep-local
        name: semgrep local scan
        entry: python scripts/precommit_semgrep.py
        language: system
        pass_filenames: true
        files: \.(py|js|ts|jsx|tsx|go|cs|java|rb|php|yaml|yml|tf|dockerfile)$
      - id: yamllint-local
        name: yamllint local scan
        entry: python scripts/precommit_yamllint.py
        language: system
        pass_filenames: true
        files: \.(yaml|yml)$
        exclude: ^k8s/templates/

  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.361
    hooks:
      - id: checkov
        stages: [manual]
        args:
          - --quiet
          - --framework
          - terraform,kubernetes,dockerfile,github_actions
          - --skip-path
          - tests/policy
          - --skip-check
          - CKV_GHA_7

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        stages: [manual]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        stages: [manual]
        exclude: ^k8s/templates/
        args:
          - -d
          - "{extends: relaxed, rules: {new-lines: disable, line-length: disable}}"
