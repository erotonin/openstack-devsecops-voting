name: Runtime Incident

on:
  repository_dispatch:
    types:
      - falco-runtime-alert
  workflow_dispatch:
    inputs:
      severity:
        description: Incident severity
        required: true
        default: warning
      title:
        description: Incident title
        required: true
        default: Falco runtime alert
      pod:
        description: Kubernetes pod name
        required: false
      namespace:
        description: Kubernetes namespace
        required: false
        default: voting
      details:
        description: Incident details
        required: false

permissions:
  contents: read
  issues: write

jobs:
  open-incident:
    name: Open incident issue
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload || {};
            const input = context.payload.inputs || {};

            const severity = payload.severity || input.severity || 'warning';
            const namespace = payload.namespace || input.namespace || 'voting';
            const pod = payload.pod || input.pod || 'unknown';
            const title = payload.title || input.title || `Falco runtime alert in ${namespace}`;
            const details = payload.details || payload.output || input.details || 'No additional details were provided.';

            const body = [
              '## Runtime Incident',
              '',
              `- Severity: ${severity}`,
              `- Namespace: ${namespace}`,
              `- Pod: ${pod}`,
              `- Source: ${context.eventName}`,
              '',
              '## Details',
              '',
              '```text',
              details,
              '```',
              '',
              '## Triage Checklist',
              '',
              '- [ ] Confirm whether the Falco alert is a true positive.',
              '- [ ] Check Loki logs for the affected pod.',
              '- [ ] Check Prometheus/Grafana for latency, error rate, and restarts.',
              '- [ ] Decide whether optional quarantine mode should be used.',
              '- [ ] Record containment and recovery timestamps for the report.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[${severity}] ${title}`,
              body,
              labels: ['incident', 'runtime-security']
            });
