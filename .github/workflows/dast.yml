name: OWASP ZAP DAST

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "HTTP/HTTPS URL to scan. Defaults to repository variable STAGING_URL."
        required: false
        type: string

permissions:
  contents: read
  issues: read

jobs:
  zap-baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target URL
        id: target
        env:
          INPUT_TARGET_URL: ${{ inputs.target_url }}
          DEFAULT_STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          target="$INPUT_TARGET_URL"
          if [ -z "$target" ]; then
            target="$DEFAULT_STAGING_URL"
          fi
          if [ -z "$target" ]; then
            echo "STAGING_URL is not set and no target_url input was provided." >&2
            exit 1
          fi
          echo "url=$target" >> "$GITHUB_OUTPUT"

      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.target.outputs.url }}
          fail_action: true
          cmd_options: -I
          allow_issue_writing: false
          artifact_name: zap-baseline-report
