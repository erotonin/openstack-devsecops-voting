name: DevSecOps CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      promote_production:
        description: "Promote the already-built main commit to production"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write
  security-events: write
  actions: write
  pull-requests: write
  issues: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  pr-security:
    name: PR security gates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile,github_actions
          quiet: true
          skip_path: tests/policy
          skip_check: CKV_GHA_7,CKV_AWS_130,CKV_AWS_136,CKV_AWS_161,CKV_AWS_23,CKV_AWS_260,CKV_AWS_338,CKV_AWS_341,CKV_AWS_38,CKV_AWS_382,CKV_AWS_39,CKV_AZURE_109,CKV_AZURE_110,CKV_AZURE_114,CKV_AZURE_115,CKV_AZURE_117,CKV_AZURE_139,CKV_AZURE_141,CKV_AZURE_163,CKV_AZURE_164,CKV_AZURE_165,CKV_AZURE_166,CKV_AZURE_167,CKV_AZURE_168,CKV_AZURE_170,CKV_AZURE_171,CKV_AZURE_172,CKV_AZURE_189,CKV_AZURE_226,CKV_AZURE_227,CKV_AZURE_232,CKV_AZURE_233,CKV_AZURE_237,CKV_AZURE_41,CKV_AZURE_42,CKV_AZURE_6,CKV2_AWS_12,CKV2_AWS_5,CKV2_AWS_50,CKV2_AWS_57,CKV2_AWS_64,CKV2_AZURE_31,CKV2_AZURE_32,CKV2_AZURE_57
          soft_fail: false

      - name: tfsec Terraform scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

      - name: Trivy filesystem dependency scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Helm template validation
        run: |
          helm lint k8s
          helm template voting-app k8s -f k8s/values-prod.yaml >/tmp/voting-prod.yaml

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Conftest Kubernetes policy scan
        run: |
          helm template voting-app k8s -f k8s/values-prod.yaml > /tmp/voting-prod.yaml
          conftest test --policy policies/conftest /tmp/voting-prod.yaml

  create-issue-on-failure:
    name: Create issue on security failure
    runs-on: ubuntu-latest
    needs: pr-security
    if: failure() && github.event_name == 'pull_request'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = 'Security Checks Failed in CI/CD';
            const issueBody = `Security checks failed for PR #${context.issue.number} ([Link](${context.payload.pull_request.html_url})).
            Please review the workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['incident', 'security']
            });

  build-scan-sign:
    name: Build signed staging artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - vote
          - result
          - worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Azure login with OIDC
        if: env.ACR_LOGIN_SERVER != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure ACR
        if: env.ACR_LOGIN_SERVER != ''
        run: az acr login --name "${ACR_LOGIN_SERVER%%.azurecr.io}"

      - name: Build image
        run: |
          docker build \
            -t "${{ matrix.service }}:${IMAGE_TAG}" \
            "./${{ matrix.service }}"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.service }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Tag image for ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker tag "${{ matrix.service }}:${IMAGE_TAG}" "${ECR_REGISTRY}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"

      - name: Tag image for ACR
        if: env.ACR_LOGIN_SERVER != ''
        run: |
          docker tag "${{ matrix.service }}:${IMAGE_TAG}" "${ACR_LOGIN_SERVER}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Push ECR image
        id: push_ecr
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          image="${ECR_REGISTRY}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"
          docker push "$image"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image" | cut -d'@' -f2)"
          echo "image_digest=${ECR_REGISTRY}/voting-app-${{ matrix.service }}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Push ACR image
        id: push_acr
        if: env.ACR_LOGIN_SERVER != ''
        run: |
          image="${ACR_LOGIN_SERVER}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"
          docker push "$image"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image" | cut -d'@' -f2)"
          echo "image_digest=${ACR_LOGIN_SERVER}/voting-app-${{ matrix.service }}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Cosign sign ECR image
        run: cosign sign --yes "${{ steps.push_ecr.outputs.image_digest }}"

      - name: Cosign sign ACR image
        if: env.ACR_LOGIN_SERVER != ''
        run: cosign sign --yes "${{ steps.push_acr.outputs.image_digest }}"

  dast-staging:
    name: DAST staging
    runs-on: ubuntu-latest
    needs: build-scan-sign
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.STAGING_URL != ''
    steps:
      - name: Wait for staging endpoint
        run: |
          health_url="${{ vars.STAGING_URL }}/healthz"
          for attempt in $(seq 1 48); do
            status="$(curl -ks -o /dev/null -w '%{http_code}' "$health_url" || true)"
            if [ "$status" = "200" ]; then
              echo "Staging endpoint is healthy: $health_url"
              exit 0
            fi
            echo "Waiting for staging endpoint ($attempt/48), last status: $status"
            sleep 10
          done
          echo "Staging endpoint did not become healthy: $health_url"
          exit 1

      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ vars.STAGING_URL }}
          fail_action: true
          cmd_options: -I
          allow_issue_writing: false
          artifact_name: zap-staging-report

  open-gitops-promotion-pr:
    name: Open GitOps promotion PR
    runs-on: ubuntu-latest
    needs:
      - build-scan-sign
      - dast-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check whether promotion is needed
        id: promote
        shell: bash
        run: |
          message="$(git log -1 --pretty=%s)"
          changed="$(git diff-tree --no-commit-id --name-only -r HEAD || true)"

          if [[ "$message" == chore:\ promote\ images* ]]; then
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          non_gitops="$(printf '%s\n' "$changed" | grep -Ev '^(k8s/values-prod.yaml|k8s/values-azure.yaml)$' || true)"
          if [ -z "$non_gitops" ]; then
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_promote=true" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        if: steps.promote.outputs.should_promote == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.promote.outputs.should_promote == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Azure login with OIDC
        if: steps.promote.outputs.should_promote == 'true' && env.ACR_LOGIN_SERVER != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update GitOps image tags
        if: steps.promote.outputs.should_promote == 'true'
        shell: pwsh
        run: |
          ./scripts/update-gitops-image-tags.ps1 `
            -ImageTag "${env:IMAGE_TAG}" `
            -EcrRegistry "${{ steps.ecr.outputs.registry }}" `
            -AcrLoginServer "${env:ACR_LOGIN_SERVER}" `
            -ResolveDigests

      - name: Create promotion pull request
        if: steps.promote.outputs.should_promote == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ACTIONS_PR_TOKEN || github.token }}
          branch: promote/images-${{ github.sha }}
          title: "chore: promote images for ${{ github.sha }}"
          commit-message: "chore: promote images for ${{ github.sha }}"
          body: |
            Promote signed images built from `${{ github.sha }}`.

            This PR updates the GitOps values files only. Merge it after reviewing the successful build, scan, SBOM, signing, and DAST jobs.
          labels: gitops,promotion

  production-approval:
    name: Production approval gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.promote_production == 'true'
    environment:
      name: production
    steps:
      - name: Approved production promotion
        run: |
          echo "Production promotion approved for commit ${GITHUB_SHA}."
          echo "This job is the human approval boundary."
          echo "Production should promote a previously signed image digest, not rebuild or deploy from a direct main push."
          echo "ArgoCD production sync is intentionally performed by GitOps, not by committing from CI."


