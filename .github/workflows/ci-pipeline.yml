name: DevSecOps CI/CD

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      promote_production:
        description: "Promote the already-built main commit to production"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write
  security-events: write
  actions: write
  pull-requests: write
  issues: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}
  STAGING_BRANCH: staging

jobs:
  feature-pr-light-scan:
    name: Feature PR light security gates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: auto

      - name: Trivy filesystem dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Fast application sanity checks
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile vote/app.py
          npm --prefix result ci --ignore-scripts
          npm --prefix result audit --audit-level=high
          dotnet restore worker/Worker.csproj
          dotnet build worker/Worker.csproj --configuration Release --no-restore

  dev-integration-security-scan:
    name: Dev integration security gates
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks full secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: auto

      - name: Checkov IaC and workflow scan
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile,github_actions
          quiet: true
          skip_path: tests/policy
          skip_check: CKV_GHA_7,CKV_AWS_130,CKV_AWS_136,CKV_AWS_161,CKV_AWS_23,CKV_AWS_260,CKV_AWS_338,CKV_AWS_341,CKV_AWS_38,CKV_AWS_382,CKV_AWS_39,CKV_AZURE_109,CKV_AZURE_110,CKV_AZURE_114,CKV_AZURE_115,CKV_AZURE_117,CKV_AZURE_136,CKV_AZURE_139,CKV_AZURE_141,CKV_AZURE_160,CKV_AZURE_163,CKV_AZURE_164,CKV_AZURE_165,CKV_AZURE_166,CKV_AZURE_167,CKV_AZURE_168,CKV_AZURE_170,CKV_AZURE_171,CKV_AZURE_172,CKV_AZURE_189,CKV_AZURE_226,CKV_AZURE_227,CKV_AZURE_232,CKV_AZURE_233,CKV_AZURE_237,CKV_AZURE_41,CKV_AZURE_42,CKV_AZURE_6,CKV2_AWS_12,CKV2_AWS_5,CKV2_AWS_50,CKV2_AWS_57,CKV2_AWS_64,CKV2_AZURE_31,CKV2_AZURE_32,CKV2_AZURE_57
          soft_fail: false

      - name: tfsec Terraform scan
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6
        with:
          working_directory: terraform
          version: v1.28.14
          github_token: ${{ github.token }}
          soft_fail: false

      - name: Trivy filesystem dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Helm render validation
        run: |
          helm lint k8s
          helm template voting-app k8s -f k8s/values-staging.yaml >/tmp/voting-staging.yaml
          helm template voting-app k8s -f k8s/values-prod.yaml >/tmp/voting-prod.yaml
          helm template voting-app k8s -f k8s/values-azure.yaml >/tmp/voting-azure.yaml

      - name: Install Conftest
        run: |
          gh release download v0.56.0 \
            --repo open-policy-agent/conftest \
            --pattern conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Conftest Kubernetes policy scan
        run: |
          conftest test --policy policies/conftest /tmp/voting-staging.yaml
          conftest test --policy policies/conftest /tmp/voting-prod.yaml
          conftest test --policy policies/conftest /tmp/voting-azure.yaml

  release-pr-security-scan:
    name: Release PR full security gates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks full secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: auto

      - name: Checkov IaC and workflow scan
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile,github_actions
          quiet: true
          skip_path: tests/policy
          skip_check: CKV_GHA_7,CKV_AWS_130,CKV_AWS_136,CKV_AWS_161,CKV_AWS_23,CKV_AWS_260,CKV_AWS_338,CKV_AWS_341,CKV_AWS_38,CKV_AWS_382,CKV_AWS_39,CKV_AZURE_109,CKV_AZURE_110,CKV_AZURE_114,CKV_AZURE_115,CKV_AZURE_117,CKV_AZURE_136,CKV_AZURE_139,CKV_AZURE_141,CKV_AZURE_160,CKV_AZURE_163,CKV_AZURE_164,CKV_AZURE_165,CKV_AZURE_166,CKV_AZURE_167,CKV_AZURE_168,CKV_AZURE_170,CKV_AZURE_171,CKV_AZURE_172,CKV_AZURE_189,CKV_AZURE_226,CKV_AZURE_227,CKV_AZURE_232,CKV_AZURE_233,CKV_AZURE_237,CKV_AZURE_41,CKV_AZURE_42,CKV_AZURE_6,CKV2_AWS_12,CKV2_AWS_5,CKV2_AWS_50,CKV2_AWS_57,CKV2_AWS_64,CKV2_AZURE_31,CKV2_AZURE_32,CKV2_AZURE_57
          soft_fail: false

      - name: tfsec Terraform scan
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6
        with:
          working_directory: terraform
          version: v1.28.14
          github_token: ${{ github.token }}
          soft_fail: false

      - name: Trivy filesystem dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Helm render validation
        run: |
          helm lint k8s
          helm template voting-app k8s -f k8s/values-staging.yaml >/tmp/voting-staging.yaml
          helm template voting-app k8s -f k8s/values-prod.yaml >/tmp/voting-prod.yaml
          helm template voting-app k8s -f k8s/values-azure.yaml >/tmp/voting-azure.yaml

      - name: Install Conftest
        run: |
          gh release download v0.56.0 \
            --repo open-policy-agent/conftest \
            --pattern conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Conftest Kubernetes policy scan
        run: |
          conftest test --policy policies/conftest /tmp/voting-staging.yaml
          conftest test --policy policies/conftest /tmp/voting-prod.yaml
          conftest test --policy policies/conftest /tmp/voting-azure.yaml

  create-issue-on-failure:
    name: Create issue on security failure
    runs-on: ubuntu-latest
    needs:
      - feature-pr-light-scan
      - dev-integration-security-scan
      - release-pr-security-scan
    if: always() && github.event_name == 'pull_request' && (needs.feature-pr-light-scan.result == 'failure' || needs.release-pr-security-scan.result == 'failure')
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Create Issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const issueTitle = `Security gate failed for PR #${context.issue.number}`;
            const issueBody = [
              `Security checks failed for PR #${context.issue.number}.`,
              ``,
              `PR: ${context.payload.pull_request.html_url}`,
              `Workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Owner action: open the failed job, inspect annotations, fix the finding, and push a new commit to the same branch.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['incident', 'security', 'ci-failure']
            });

  classify-main-push:
    name: Classify main push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      build_required: ${{ steps.classify.outputs.build_required }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: Decide whether this is a release build or GitOps-only promotion
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff-tree --no-commit-id --name-only -r HEAD || true)"
          non_gitops="$(printf '%s\n' "$changed" | grep -Ev '^(k8s/values-staging.yaml|k8s/values-prod.yaml|k8s/values-azure.yaml)$' || true)"

          if [[ -z "$non_gitops" ]]; then
            echo "build_required=false" >> "$GITHUB_OUTPUT"
            echo "Main push only changed GitOps values; production ArgoCD will sync without rebuilding."
            exit 0
          fi

          echo "build_required=true" >> "$GITHUB_OUTPUT"
          echo "Main push changed release source/config; build, sign, verify, scan, staging, DAST, and promotion are required."

  build-sign-verify-scan:
    name: Build, sign, verify, and scan image
    runs-on: ubuntu-latest
    needs: classify-main-push
    if: needs.classify-main-push.outputs.build_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          - vote
          - result
          - worker
    steps:
      - name: Checkout release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Azure login with OIDC
        if: env.ACR_LOGIN_SERVER != ''
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure ACR
        if: env.ACR_LOGIN_SERVER != ''
        run: az acr login --name "${ACR_LOGIN_SERVER%%.azurecr.io}"

      - name: Build image
        run: |
          docker build \
            -t "${{ matrix.service }}:${IMAGE_TAG}" \
            "./${{ matrix.service }}"

      - name: Install Syft
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Installing Syft (attempt ${attempt}/3)"
            rm -f /tmp/syft /tmp/syft_1.42.3_linux_amd64.tar.gz
            if gh release download v1.42.3 \
                --repo anchore/syft \
                --pattern syft_1.42.3_linux_amd64.tar.gz \
                --dir /tmp; then
              tar xzf /tmp/syft_1.42.3_linux_amd64.tar.gz -C /tmp syft
              sudo mv /tmp/syft /usr/local/bin/syft
              syft version
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "Failed to install Syft after retries"
          exit 1

      - name: Generate SBOM from local build artifact
        run: |
          syft "${{ matrix.service }}:${IMAGE_TAG}" -o spdx-json=sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

      - name: Tag image for ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker tag "${{ matrix.service }}:${IMAGE_TAG}" "${ECR_REGISTRY}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"

      - name: Tag image for ACR
        if: env.ACR_LOGIN_SERVER != ''
        run: |
          docker tag "${{ matrix.service }}:${IMAGE_TAG}" "${ACR_LOGIN_SERVER}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac

      - name: Push ECR image and resolve digest
        id: push_ecr
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          image="${ECR_REGISTRY}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"
          docker push "$image"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image" | cut -d'@' -f2)"
          echo "image_digest=${ECR_REGISTRY}/voting-app-${{ matrix.service }}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Push ACR image and resolve digest
        id: push_acr
        if: env.ACR_LOGIN_SERVER != ''
        run: |
          image="${ACR_LOGIN_SERVER}/voting-app-${{ matrix.service }}:${IMAGE_TAG}"
          docker push "$image"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image" | cut -d'@' -f2)"
          echo "image_digest=${ACR_LOGIN_SERVER}/voting-app-${{ matrix.service }}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Cosign keyless sign ECR digest
        run: cosign sign --yes "${{ steps.push_ecr.outputs.image_digest }}"

      - name: Cosign keyless sign ACR digest
        if: env.ACR_LOGIN_SERVER != ''
        run: cosign sign --yes "${{ steps.push_acr.outputs.image_digest }}"

      - name: Verify ECR signature identity and crypto policy
        run: |
          bash scripts/verify-cosign-signature-policy.sh \
            "${{ steps.push_ecr.outputs.image_digest }}" \
            "https://github.com/${{ github.repository }}/.github/workflows/ci-pipeline.yml@refs/heads/main"

      - name: Verify ACR signature identity and crypto policy
        if: env.ACR_LOGIN_SERVER != ''
        run: |
          bash scripts/verify-cosign-signature-policy.sh \
            "${{ steps.push_acr.outputs.image_digest }}" \
            "https://github.com/${{ github.repository }}/.github/workflows/ci-pipeline.yml@refs/heads/main"

      - name: Trivy image scan after signature verification
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.push_ecr.outputs.image_digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  deploy-staging-gitops:
    name: Deploy staging through ArgoCD GitOps
    runs-on: ubuntu-latest
    needs: build-sign-verify-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Azure login with OIDC
        if: env.ACR_LOGIN_SERVER != ''
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update staging GitOps branch
        shell: pwsh
        run: |
          ./scripts/update-gitops-image-tags.ps1 `
            -ImageTag "${env:IMAGE_TAG}" `
            -EcrRegistry "${{ steps.ecr.outputs.registry }}" `
            -AcrLoginServer "${env:ACR_LOGIN_SERVER}" `
            -AwsValuesPath "k8s/values-staging.yaml" `
            -AzureValuesPath "k8s/values-azure.yaml" `
            -ResolveDigests

      - name: Push staging environment desired state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${STAGING_BRANCH}"
          git add k8s/values-staging.yaml k8s/values-azure.yaml
          if git diff --cached --quiet; then
            echo "Staging GitOps branch already points at ${IMAGE_TAG}."
            exit 0
          fi
          git commit -m "chore: deploy ${IMAGE_TAG} to staging"
          git push --force-with-lease origin "HEAD:${STAGING_BRANCH}"

  dast-staging:
    name: DAST staging smoke and baseline scan
    runs-on: ubuntu-latest
    needs: deploy-staging-gitops
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Require staging URL
        if: vars.STAGING_URL == ''
        run: |
          echo "STAGING_URL repository variable is required for the smoke test and OWASP ZAP DAST gate."
          echo "Run scripts/configure-github-repo.ps1 after voting-staging/vote has a LoadBalancer endpoint."
          exit 1

      - name: Smoke test staging endpoint
        if: vars.STAGING_URL != ''
        run: |
          health_url="${{ vars.STAGING_URL }}/healthz"
          for attempt in $(seq 1 48); do
            status="$(curl -ks -o /dev/null -w '%{http_code}' "$health_url" || true)"
            if [[ "$status" == "200" ]]; then
              echo "Staging endpoint is healthy: $health_url"
              exit 0
            fi
            echo "Waiting for staging endpoint ($attempt/48), last status: $status"
            sleep 10
          done
          echo "Staging endpoint did not become healthy: $health_url"
          exit 1

      - name: OWASP ZAP baseline
        if: vars.STAGING_URL != ''
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          target: ${{ vars.STAGING_URL }}
          fail_action: true
          cmd_options: -I
          allow_issue_writing: false
          artifact_name: zap-staging-report

  open-gitops-promotion-pr:
    name: Open GitOps promotion PR
    runs-on: ubuntu-latest
    needs:
      - build-sign-verify-scan
      - dast-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: Check whether promotion is needed
        id: promote
        shell: bash
        run: |
          message="$(git log -1 --pretty=%s)"
          changed="$(git diff-tree --no-commit-id --name-only -r HEAD || true)"

          if [[ "$message" == chore:\ promote\ images* ]]; then
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          non_gitops="$(printf '%s\n' "$changed" | grep -Ev '^(k8s/values-staging.yaml|k8s/values-prod.yaml|k8s/values-azure.yaml)$' || true)"
          if [[ -z "$non_gitops" ]]; then
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_promote=true" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        if: steps.promote.outputs.should_promote == 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.promote.outputs.should_promote == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Azure login with OIDC
        if: steps.promote.outputs.should_promote == 'true' && env.ACR_LOGIN_SERVER != ''
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update GitOps image tags
        if: steps.promote.outputs.should_promote == 'true'
        shell: pwsh
        run: |
          ./scripts/update-gitops-image-tags.ps1 `
            -ImageTag "${env:IMAGE_TAG}" `
            -EcrRegistry "${{ steps.ecr.outputs.registry }}" `
            -AcrLoginServer "${env:ACR_LOGIN_SERVER}" `
            -ResolveDigests

      - name: Create promotion pull request
        if: steps.promote.outputs.should_promote == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ secrets.ACTIONS_PR_TOKEN || github.token }}
          branch: promote/images-${{ github.sha }}
          title: "chore: promote images for ${{ github.sha }}"
          commit-message: "chore: promote images for ${{ github.sha }}"
          body: |
            Promote signed images built from `${{ github.sha }}`.

            This PR updates the GitOps values files only. Merge it after reviewing the successful build, signature verification, image scan, SBOM, and DAST jobs.
          labels: gitops,promotion

  production-approval:
    name: Production approval gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.promote_production == 'true'
    environment:
      name: production
    steps:
      - name: Approved production promotion
        run: |
          echo "Production promotion approved for commit ${GITHUB_SHA}."
          echo "This job is the human approval boundary."
          echo "Production should promote a previously signed image digest, not rebuild or deploy from a direct main push."
          echo "ArgoCD production sync is intentionally performed by GitOps, not by committing from CI."
