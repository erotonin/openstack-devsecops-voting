name: DevSecOps CI/CD

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write
  pull-requests: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  pr-gate:
    name: Security and render gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: auto

      - name: Trivy filesystem and dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Application sanity checks
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile vote/app.py
          npm --prefix result ci --ignore-scripts
          npm --prefix result audit --audit-level=high
          dotnet restore worker/Worker.csproj
          dotnet build worker/Worker.csproj --configuration Release --no-restore

      - name: Checkov IaC and manifest scan
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile,github_actions
          quiet: true
          skip_path: tests/policy
          skip_check: CKV_GHA_7
          soft_fail: false

      - name: tfsec Terraform scan
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6
        with:
          working_directory: terraform/openstack
          version: v1.28.14
          github_token: ${{ github.token }}
          soft_fail: false

      - name: Terraform format and validate
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=terraform/openstack init -backend=false
          terraform -chdir=terraform/openstack fmt -check
          terraform -chdir=terraform/openstack validate

      - name: Helm render validation
        shell: bash
        run: |
          set -euo pipefail
          helm lint k8s
          helm template voting-app k8s -f k8s/values-openstack.yaml > /tmp/voting-openstack.yaml

      - name: Install Conftest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f conftest conftest_0.56.0_Linux_x86_64.tar.gz
          gh release download v0.56.0 \
            --repo open-policy-agent/conftest \
            --pattern conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Conftest Kubernetes policy scan
        run: conftest test --policy policies/conftest /tmp/voting-openstack.yaml

  build-image:
    name: Build, sign, scan, and push images
    runs-on: ubuntu-latest
    needs: pr-gate
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - vote
          - result
          - worker
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate Harbor settings
        shell: bash
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$HARBOR_REGISTRY"
          test -n "$HARBOR_USERNAME"
          test -n "$HARBOR_PASSWORD"

      - name: Login to Harbor
        shell: bash
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" --username "$HARBOR_USERNAME" --password-stdin

      - name: Build image
        id: image
        shell: bash
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
        run: |
          set -euo pipefail
          image="${HARBOR_REGISTRY}/voting/${{ matrix.service }}:${IMAGE_TAG}"
          docker build -t "$image" "./${{ matrix.service }}"
          echo "ref=$image" >> "$GITHUB_OUTPUT"

      - name: Install Syft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f /tmp/syft /tmp/syft_1.42.3_linux_amd64.tar.gz
          gh release download v1.42.3 \
            --repo anchore/syft \
            --pattern syft_1.42.3_linux_amd64.tar.gz \
            --dir /tmp
          tar xzf /tmp/syft_1.42.3_linux_amd64.tar.gz -C /tmp syft
          sudo mv /tmp/syft /usr/local/bin/syft

      - name: Generate SBOM
        run: syft "${{ steps.image.outputs.ref }}" -o spdx-json=sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

      - name: Push image
        id: push
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.image.outputs.ref }}"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.image.outputs.ref }}")"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac

      - name: Sign image digest
        run: cosign sign --yes "${{ steps.push.outputs.digest }}"

      - name: Verify signature identity and crypto policy
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          SIGNATURE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/ci-pipeline.yml@${{ github.ref }}
        run: |
          bash scripts/verify-cosign-signature-policy.sh \
            "$IMAGE_DIGEST" \
            "$SIGNATURE_IDENTITY"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.push.outputs.digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  update-gitops:
    name: Update GitOps image tags
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Update values-openstack image tags
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("k8s/values-openstack.yaml")
          tag = os.environ["IMAGE_TAG"]
          services = {"vote", "result", "worker"}
          current = []
          output = []

          for line in path.read_text().splitlines():
              stripped = line.strip()
              if stripped == "images:":
                  current = ["images"]
              elif current and line.startswith("  ") and not line.startswith("    ") and stripped.endswith(":"):
                  name = stripped[:-1]
                  current = ["images", name] if name in services else []
              elif current and len(current) == 2 and stripped.startswith("tag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  line = f"{indent}tag: {tag}"
              output.append(line)

          path.write_text("\n".join(output) + "\n")
          PY

      - name: Commit desired state update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/values-openstack.yaml
          if git diff --cached --quiet; then
            echo "values-openstack.yaml already uses ${IMAGE_TAG}."
            exit 0
          fi
          git commit -m "chore: update OpenStack image tags ${IMAGE_TAG}"
          git push

  dast:
    name: Optional ZAP DAST
    runs-on: ubuntu-latest
    needs: update-gitops
    if: github.event_name == 'push' && vars.STAGING_URL != ''
    steps:
      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          target: ${{ vars.STAGING_URL }}
          fail_action: true
          cmd_options: -I
          allow_issue_writing: false
          artifact_name: zap-openstack-report
