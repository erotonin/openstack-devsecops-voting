name: Production GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate production manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Helm lint
        run: helm lint k8s

      - name: Render Helm template
        run: |
          helm template voting-prod k8s \
            -f k8s/values-openstack.yaml \
            -f k8s/values-prod.yaml > /tmp/voting-prod.yaml

      - name: Install Conftest
        run: |
          curl -L -sSf https://github.com/open-policy-agent/conftest/releases/download/v0.52.0/conftest_0.52.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/

      - name: Conftest verification
        run: |
          if [ -d policies/conftest ]; then
            conftest test --policy policies/conftest /tmp/voting-prod.yaml
          fi

      - name: Verify production values pin digests
        run: |
          set -euo pipefail
          python scripts/ci/verify-values-digests.py \
            --base k8s/values-openstack.yaml \
            --values k8s/values-prod.yaml

  deploy:
    name: Sync and deploy production
    runs-on: [self-hosted, linux, openstack]
    needs: validate
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure ArgoCD production app exists
        shell: bash
        run: kubectl apply -f k8s/argocd-app-prod.yaml

      - name: Wait for production deployment
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n argocd annotate application voting-prod argocd.argoproj.io/refresh=hard --overwrite
          kubectl -n argocd wait application/voting-prod --for=jsonpath='{.status.sync.status}'=Synced --timeout=10m
          kubectl -n voting-prod rollout status deploy/vote --timeout=5m
          kubectl -n voting-prod rollout status deploy/result --timeout=5m
          kubectl -n voting-prod rollout status deploy/worker --timeout=5m
          kubectl -n argocd get application voting-prod -o wide
