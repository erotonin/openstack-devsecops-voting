name: Quarantine Compromised Pod

on:
  workflow_dispatch:
    inputs:
      pod_name:
        description: "Name of the pod to quarantine"
        required: true
      namespace:
        description: "Namespace of the pod"
        required: true
        default: "voting"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: voting-app-cluster

jobs:
  containment:
    name: Execute Network Quarantine
    runs-on: ubuntu-latest
    environment: security-response

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Apply Quarantine NetworkPolicy
        run: |
          # Ensure the NetworkPolicy that blocks egress/ingress exists in the cluster
          kubectl apply -f response/k8s/quarantine-networkpolicy.yaml

      - name: Label Pod for Quarantine
        run: |
          echo "Isolating pod ${{ github.event.inputs.pod_name }} in namespace ${{ github.event.inputs.namespace }}..."
          kubectl label pod ${{ github.event.inputs.pod_name }} -n ${{ github.event.inputs.namespace }} security.devsecops/quarantine=true --overwrite
          
          echo "Pod isolated successfully."
          echo "Run 'kubectl describe pod ${{ github.event.inputs.pod_name }} -n ${{ github.event.inputs.namespace }}' to verify."
